<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Alone Monster Coding Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #f72585;
      --violet:  #7209b7;
      --purple:  #3a0ca3;
      --blue:    #4361ee;
      --light:   #f8f0ff;
      --card-bg: rgba(255,255,255,0.07);
      --border:  rgba(247,37,133,0.25);
      --text:    #fff;
      --muted:   rgba(255,255,255,0.55);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: #0a0010;
      overflow: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(114,9,183,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 80%, rgba(247,37,133,0.45) 0%, transparent 55%),
        radial-gradient(ellipse 50% 70% at 50% 50%, rgba(58,12,163,0.3) 0%, transparent 70%),
        #0a0010;
    }

    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 38px 38px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 38px 38px; }
    }

    /* Floating orbs */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(70px); opacity: 0.35;
      animation: float 8s ease-in-out infinite;
      z-index: 0; pointer-events: none;
    }
    .orb1 { width:300px; height:300px; background:var(--pink);   top:-80px;  left:-80px;  animation-delay:0s; }
    .orb2 { width:250px; height:250px; background:var(--violet); bottom:-60px; right:-60px; animation-delay:-3s; }
    .orb3 { width:180px; height:180px; background:var(--blue);   top:50%;  left:60%;   animation-delay:-5s; }

    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-30px) scale(1.08); }
    }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px 16px;
    }

    /* ── LOGO ── */
    .brand {
      text-align: center; margin-bottom: 24px;
      animation: fadeDown 0.7s ease both;
    }
    .brand-icon {
      width: 58px; height: 58px;
      background: linear-gradient(135deg, var(--pink), var(--violet));
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 10px;
      box-shadow: 0 0 30px rgba(247,37,133,0.5);
    }
    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem; font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #fff 40%, var(--pink));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand p { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }

    /* ── MODE SWITCH (Member / Admin) ── */
    .mode-switch {
      display: flex; gap: 8px;
      width: 100%; max-width: 420px;
      margin-bottom: 14px;
      animation: fadeUp 0.7s ease 0.1s both;
    }
    .mode-btn {
      flex: 1;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 14px;
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: all 0.25s ease;
    }
    .mode-btn .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: currentColor; opacity: 0.7;
    }
    .mode-btn:hover {
      color: #fff;
      border-color: rgba(247,37,133,0.4);
    }
    .mode-btn.active {
      background: linear-gradient(135deg, var(--pink), var(--violet));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 20px rgba(247,37,133,0.4);
    }
    .mode-btn.active .dot { background: #fff; opacity: 1; }

    /* ── CARD ── */
    .card {
      width: 100%; max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(247,37,133,0.08),
        0 24px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: fadeUp 0.7s ease 0.15s both;
    }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:none; } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }

    /* ── ADMIN BADGE ── */
    .admin-badge {
      display: none;
      align-items: center; gap: 8px;
      padding: 9px 14px;
      margin-bottom: 18px;
      background: linear-gradient(135deg, rgba(247,37,133,0.18), rgba(114,9,183,0.18));
      border: 1px solid rgba(247,37,133,0.4);
      border-radius: 50px;
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem; font-weight: 700;
      color: var(--pink); letter-spacing: 0.1em;
      text-transform: uppercase;
      width: fit-content;
    }
    body.admin-mode .admin-badge { display: inline-flex; }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 6px;
      background: rgba(0,0,0,0.3);
      border-radius: 14px; padding: 5px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1; text-align: center;
      padding: 9px 0; border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; border: none;
      background: transparent; color: var(--muted);
      transition: all 0.25s ease;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--pink), var(--violet));
      color: #fff;
      box-shadow: 0 4px 16px rgba(247,37,133,0.35);
    }

    /* ── FORM ── */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.75rem; font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px; letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff; font-size: 0.92rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus {
      border-color: var(--pink);
      background: rgba(247,37,133,0.06);
      box-shadow: 0 0 0 3px rgba(247,37,133,0.15);
    }

    /* ── BUTTON ── */
    .btn {
      width: 100%; margin-top: 6px;
      padding: 14px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--violet) 100%);
      border: none; border-radius: 12px;
      color: #fff; font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(247,37,133,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(rgba(255,255,255,0.12), transparent);
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(247,37,133,0.45); }
    .btn:active { transform: translateY(0); opacity: 0.85; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: rgba(255,255,255,0.1);
    }

    /* ── GOOGLE BUTTON ── */
    .btn-google {
      width: 100%; padding: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
    }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── ERROR / SUCCESS TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
      padding: 12px 22px; border-radius: 50px;
      font-size: 0.85rem; font-weight: 500;
      white-space: nowrap; z-index: 999;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
      opacity: 0; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.error   { background: #ff3366; color: #fff; box-shadow: 0 6px 24px rgba(255,51,102,0.4); }
    #toast.success { background: #22c55e; color: #fff; box-shadow: 0 6px 24px rgba(34,197,94,0.4); }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    .footer {
      margin-top: 20px; text-align: center;
      font-size: 0.73rem; color: var(--muted);
      animation: fadeUp 0.7s ease 0.3s both;
    }
    .footer a { color: var(--pink); text-decoration: none; }

    /* Mobile */
    @media (max-width: 480px) {
      .card { padding: 26px 20px; }
      .mode-btn { font-size: 0.76rem; padding: 10px; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">👾</div>
      <h1>Alone Monster Coding Hub</h1>
      <p>Members-only access</p>
    </div>

    <!-- MODE SWITCH -->
    <div class="mode-switch" role="tablist" aria-label="Login mode">
      <button class="mode-btn active" id="memberModeBtn" type="button" onclick="switchMode('member')">
        <span class="dot"></span> Member Mode
      </button>
      <button class="mode-btn" id="adminModeBtn" type="button" onclick="switchMode('admin')">
        <span class="dot"></span> Admin Mode
      </button>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Admin badge (only visible in admin mode) -->
      <div class="admin-badge">🔐 Restricted Admin Access</div>

      <!-- ════════ MEMBER MODE ════════ -->
      <div id="memberPanel">
        <!-- Tabs -->
        <div class="tabs">
          <button class="tab active" data-tab="login" type="button" onclick="switchTab('login', this)">Login</button>
          <button class="tab" data-tab="signup" type="button" onclick="switchTab('signup', this)">Sign Up</button>
        </div>

        <!-- LOGIN FORM -->
        <div class="form-section active" id="loginSection">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password"/>
          </div>
          <button class="btn" id="loginBtn" type="button" onclick="handleLogin()">Login</button>

          <div class="divider">or</div>
          <button class="btn-google" type="button" onclick="handleGoogle()">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
          </button>
        </div>

        <!-- SIGNUP FORM -->
        <div class="form-section" id="signupSection">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="Your name" autocomplete="name"/>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Min. 6 characters" autocomplete="new-password"/>
          </div>
          <button class="btn" id="signupBtn" type="button" onclick="handleSignup()">Create Account</button>

          <div class="divider">or</div>
          <button class="btn-google" type="button" onclick="handleGoogle()">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign up with Google
          </button>
        </div>
      </div>

      <!-- ════════ ADMIN MODE ════════ -->
      <div id="adminPanel" style="display:none;">
        <div class="form-group">
          <label>Admin Username</label>
          <input type="text" id="adminUser" placeholder="Enter admin username" autocomplete="off" spellcheck="false"/>
        </div>
        <div class="form-group">
          <label>Admin Password</label>
          <input type="password" id="adminPass" placeholder="Enter admin password" autocomplete="off"/>
        </div>
        <button class="btn" id="adminBtn" type="button" onclick="handleAdminLogin()">Enter Admin Console</button>
      </div>

    </div>

    <div class="footer">
      Protected by Google &nbsp;·&nbsp;
      <a href="https://alone-monster.github.io">alone-monster.github.io</a>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- ══════════ FIREBASE CDN ══════════ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <script>
    // ══════════ FIREBASE CONFIG ══════════
    const firebaseConfig = {
      apiKey:            "AIzaSyBNeAqfrJ9fTjYUkWEpz-DZxOd9S1Rqp8c",
      authDomain:        "alone-monster-coding-hub.firebaseapp.com",
      projectId:         "alone-monster-coding-hub",
      storageBucket:     "alone-monster-coding-hub.firebasestorage.app",
      messagingSenderId: "92310923147",
      appId:             "1:92310923147:web:26a09f2aed09d9aef3718e",
      measurementId:     "G-4YPW7T4WGN"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Agar already logged in hai → seedha home bhejo (skip if admin login in progress)
    auth.onAuthStateChanged((user) => {
      if (user && !sessionStorage.getItem('__am_admin_redirect')) {
        window.location.href = "/index.html";
      }
    });

    // ══════════ MODE SWITCH (Member / Admin) ══════════
    let currentMode = 'member';
    function switchMode(mode) {
      currentMode = mode;
      const memberPanel = document.getElementById('memberPanel');
      const adminPanel  = document.getElementById('adminPanel');
      const memberBtn   = document.getElementById('memberModeBtn');
      const adminBtn    = document.getElementById('adminModeBtn');

      if (mode === 'admin') {
        document.body.classList.add('admin-mode');
        memberPanel.style.display = 'none';
        adminPanel.style.display  = 'block';
        memberBtn.classList.remove('active');
        adminBtn.classList.add('active');
        setTimeout(() => document.getElementById('adminUser').focus(), 50);
      } else {
        document.body.classList.remove('admin-mode');
        adminPanel.style.display  = 'none';
        memberPanel.style.display = 'block';
        adminBtn.classList.remove('active');
        memberBtn.classList.add('active');
      }
    }

    // ══════════ TAB SWITCH (Login / Signup inside Member Mode) ══════════
    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      document.getElementById(tab + 'Section').classList.add('active');
    }

    // ══════════ TOAST ══════════
    function showToast(msg, type = 'error') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show ' + type;
      setTimeout(() => { t.className = ''; }, 3500);
    }

    // ══════════ LOADING STATE ══════════
    function setLoading(btnId, loading, originalText) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading
        ? `<span class="spinner"></span> Please wait...`
        : originalText;
    }

    // ══════════ LOGIN ══════════
    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPassword').value;

      if (!email || !pass) return showToast('⚠️ Email aur password dono daalo');

      setLoading('loginBtn', true, 'Login');
      try {
        await auth.signInWithEmailAndPassword(email, pass);
        showToast('✅ Login successful!', 'success');
        setTimeout(() => window.location.href = '/index.html', 800);
      } catch (err) {
        setLoading('loginBtn', false, 'Login');
        const msgs = {
          'auth/user-not-found':  '❌ Account nahi mila. Pehle signup karo.',
          'auth/wrong-password':  '❌ Password galat hai.',
          'auth/invalid-email':   '❌ Valid email daalo.',
          'auth/too-many-requests': '⚠️ Bahut zyada attempts. Thodi der baad try karo.',
        };
        showToast(msgs[err.code] || '❌ ' + err.message);
      }
    }

    // ══════════ SIGNUP ══════════
    async function handleSignup() {
      const name  = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const pass  = document.getElementById('signupPassword').value;

      if (!name)        return showToast('⚠️ Apna naam daalo');
      if (!email)       return showToast('⚠️ Email daalo');
      if (pass.length < 6) return showToast('⚠️ Password kam se kam 6 characters ka hona chahiye');

      setLoading('signupBtn', true, 'Create Account');
      try {
        const result = await auth.createUserWithEmailAndPassword(email, pass);
        await result.user.updateProfile({ displayName: name });
        showToast('🎉 Account ban gaya!', 'success');
        setTimeout(() => window.location.href = '/index.html', 800);
      } catch (err) {
        setLoading('signupBtn', false, 'Create Account');
        const msgs = {
          'auth/email-already-in-use': '❌ Yeh email pehle se registered hai. Login karo.',
          'auth/invalid-email':        '❌ Valid email daalo.',
          'auth/weak-password':        '❌ Password thoda strong rakho.',
        };
        showToast(msgs[err.code] || '❌ ' + err.message);
      }
    }

    // ══════════ GOOGLE LOGIN ══════════
    async function handleGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
        showToast('✅ Google login successful!', 'success');
        setTimeout(() => window.location.href = '/index.html', 800);
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          showToast('❌ Google login mein kuch gadbad hui.');
        }
      }
    }

    // ══════════════════════════════════════════════════════════
    //  ADMIN LOGIN — credentials NEVER appear in source code.
    //  Only a salted PBKDF2-SHA256 hash is stored. Even if
    //  someone inspects the page, they cannot read the username
    //  or password — only a random salt and hash bytes.
    // ══════════════════════════════════════════════════════════
    const __ADMIN_VAULT = {
      s: "xiPogWoUcF/M0Fqg0progQ==",                  // random salt
      h: "2X728cDKSQSjAZhF638ZfuQ5HE1POYDxgwBuepNEwuM=", // iterated SHA-256 hash
      i: 1000,                                         // iterations (mobile-friendly)
      r: "https://alone-monster.github.io/"       // success redirect
    };

    function _b64ToBytes(b64) {
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }
    function _bytesToB64(bytes) {
      let s = '';
      for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
      return btoa(s);
    }
    function _concat(a, b) {
      const out = new Uint8Array(a.length + b.length);
      out.set(a, 0); out.set(b, a.length);
      return out;
    }
    function _utf8(str) {
      if (typeof TextEncoder !== 'undefined') return new TextEncoder().encode(str);
      const out = [];
      for (let i = 0; i < str.length; i++) {
        let c = str.charCodeAt(i);
        if (c < 0x80) out.push(c);
        else if (c < 0x800) { out.push(0xc0 | (c >> 6)); out.push(0x80 | (c & 0x3f)); }
        else { out.push(0xe0 | (c >> 12)); out.push(0x80 | ((c >> 6) & 0x3f)); out.push(0x80 | (c & 0x3f)); }
      }
      return new Uint8Array(out);
    }

    /* ── Pure-JS SHA-256 (used when crypto.subtle is unavailable, e.g. when
       page is opened from a non-secure context like content:// or file://) ── */
    const _K = new Uint32Array([
      0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
      0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
      0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
      0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
      0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
      0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
      0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
      0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
    ]);
    function _sha256(bytes) {
      const len = bytes.length;
      const bits = len * 8;
      const padLen = (((len + 9 + 63) >> 6) << 6);
      const buf = new Uint8Array(padLen);
      buf.set(bytes);
      buf[len] = 0x80;
      // 64-bit big-endian length (we only fill low 32 bits)
      buf[padLen - 4] = (bits >>> 24) & 0xff;
      buf[padLen - 3] = (bits >>> 16) & 0xff;
      buf[padLen - 2] = (bits >>> 8) & 0xff;
      buf[padLen - 1] = bits & 0xff;

      let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,
          h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;
      const w = new Uint32Array(64);
      for (let i = 0; i < padLen; i += 64) {
        for (let t = 0; t < 16; t++) {
          const j = i + t * 4;
          w[t] = ((buf[j] << 24) | (buf[j+1] << 16) | (buf[j+2] << 8) | buf[j+3]) >>> 0;
        }
        for (let t = 16; t < 64; t++) {
          const x = w[t-15], y = w[t-2];
          const s0 = ((x>>>7)|(x<<25)) ^ ((x>>>18)|(x<<14)) ^ (x>>>3);
          const s1 = ((y>>>17)|(y<<15)) ^ ((y>>>19)|(y<<13)) ^ (y>>>10);
          w[t] = (w[t-16] + s0 + w[t-7] + s1) >>> 0;
        }
        let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,hh=h7;
        for (let t = 0; t < 64; t++) {
          const S1 = ((e>>>6)|(e<<26)) ^ ((e>>>11)|(e<<21)) ^ ((e>>>25)|(e<<7));
          const ch = (e & f) ^ ((~e) & g);
          const t1 = (hh + S1 + ch + _K[t] + w[t]) >>> 0;
          const S0 = ((a>>>2)|(a<<30)) ^ ((a>>>13)|(a<<19)) ^ ((a>>>22)|(a<<10));
          const mj = (a & b) ^ (a & c) ^ (b & c);
          const t2 = (S0 + mj) >>> 0;
          hh = g; g = f; f = e; e = (d + t1) >>> 0;
          d = c; c = b; b = a; a = (t1 + t2) >>> 0;
        }
        h0=(h0+a)>>>0; h1=(h1+b)>>>0; h2=(h2+c)>>>0; h3=(h3+d)>>>0;
        h4=(h4+e)>>>0; h5=(h5+f)>>>0; h6=(h6+g)>>>0; h7=(h7+hh)>>>0;
      }
      const out = new Uint8Array(32);
      const hs = [h0,h1,h2,h3,h4,h5,h6,h7];
      for (let i = 0; i < 8; i++) {
        out[i*4]   = (hs[i] >>> 24) & 0xff;
        out[i*4+1] = (hs[i] >>> 16) & 0xff;
        out[i*4+2] = (hs[i] >>> 8) & 0xff;
        out[i*4+3] = hs[i] & 0xff;
      }
      return out;
    }

    async function _sha256Async(bytes) {
      // Prefer Web Crypto when available (faster), fall back to pure JS.
      try {
        if (typeof crypto !== 'undefined' && crypto.subtle && crypto.subtle.digest) {
          const buf = await crypto.subtle.digest('SHA-256', bytes);
          return new Uint8Array(buf);
        }
      } catch (_) { /* fallthrough */ }
      return _sha256(bytes);
    }

    async function _derive(user, pass) {
      const salt = _b64ToBytes(__ADMIN_VAULT.s);
      let h = await _sha256Async(_concat(salt, _utf8(user + '::' + pass)));
      for (let i = 0; i < __ADMIN_VAULT.i; i++) {
        h = await _sha256Async(_concat(salt, h));
        // Yield to the event loop every 100 iterations so the UI doesn't freeze on mobile.
        if ((i & 0x7f) === 0) await new Promise(r => setTimeout(r, 0));
      }
      return h;
    }

    function _constantTimeEqual(a, b) {
      if (a.length !== b.length) return false;
      let diff = 0;
      for (let i = 0; i < a.length; i++) diff |= a[i] ^ b[i];
      return diff === 0;
    }

    async function handleAdminLogin() {
      const user = document.getElementById('adminUser').value;
      const pass = document.getElementById('adminPass').value;

      if (!user || !pass) return showToast('⚠️ Username aur password dono daalo');

      setLoading('adminBtn', true, 'Enter Admin Console');
      let derived;
      try {
        derived = await _derive(user, pass);
      } catch (err) {
        setLoading('adminBtn', false, 'Enter Admin Console');
        return showToast('❌ Verification failed. Try again.');
      }

      const expected = _b64ToBytes(__ADMIN_VAULT.h);
      if (!_constantTimeEqual(derived, expected)) {
        setLoading('adminBtn', false, 'Enter Admin Console');
        return showToast('❌ Galat admin credentials.');
      }

      // ✅ Verified. Now redirect — but DO NOT await firebase signOut
      // (it can hang forever in offline / non-secure contexts).
      try { sessionStorage.setItem('__am_admin_redirect', '1'); } catch (_) {}
      try {
        if (typeof auth !== 'undefined' && auth && typeof auth.signOut === 'function') {
          auth.signOut().catch(() => {}); // fire-and-forget
        }
      } catch (_) {}

      showToast('✅ Admin verified — redirecting...', 'success');

      // Try every redirect strategy back-to-back. One of them WILL work.
      const goto = __ADMIN_VAULT.r;
      const tryRedirect = () => {
        try { window.location.assign(goto); } catch (_) {}
        try { window.location.href = goto; } catch (_) {}
        try { window.location.replace(goto); } catch (_) {}
        try { window.top.location.href = goto; } catch (_) {}
        try { window.open(goto, '_self'); } catch (_) {}
      };
      tryRedirect();
      setTimeout(tryRedirect, 200);

      // Final visible fallback: if after 1.2s we are still on this page
      // (some Android in-app browsers block JS redirects to external URLs),
      // show a big tap-to-continue link the user can press manually.
      setTimeout(() => {
        if (document.getElementById('manualRedirect')) return;
        const wrap = document.createElement('div');
        wrap.id = 'manualRedirect';
        wrap.style.cssText = 'margin-top:16px;text-align:center;animation:fadeUp .4s both;';
        wrap.innerHTML =
          '<a href="' + goto + '" target="_self" rel="noopener" ' +
          'style="display:inline-block;padding:14px 22px;border-radius:12px;' +
          'background:linear-gradient(135deg,#f72585,#7209b7);color:#fff;' +
          'font-family:Syne,sans-serif;font-weight:700;letter-spacing:.04em;' +
          'text-decoration:none;box-shadow:0 6px 24px rgba(247,37,133,.45);">' +
          '🚀 Tap here to continue →</a>' +
          '<p style="margin-top:10px;font-size:.72rem;color:rgba(255,255,255,.55);">' +
          'Auto-redirect blocked. Tap the button above.</p>';
        const panel = document.getElementById('adminPanel');
        if (panel) panel.appendChild(wrap);
        setLoading('adminBtn', false, 'Enter Admin Console');
      }, 1200);
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (currentMode === 'admin') return handleAdminLogin();
      const loginActive = document.getElementById('loginSection').classList.contains('active');
      loginActive ? handleLogin() : handleSignup();
    });
  </script>
