<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Alone Monster Coding Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #f72585;
      --violet:  #7209b7;
      --purple:  #3a0ca3;
      --blue:    #4361ee;
      --light:   #f8f0ff;
      --card-bg: rgba(255,255,255,0.07);
      --border:  rgba(247,37,133,0.25);
      --text:    #fff;
      --muted:   rgba(255,255,255,0.55);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: #0a0010;
      overflow: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(114,9,183,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 80%, rgba(247,37,133,0.45) 0%, transparent 55%),
        radial-gradient(ellipse 50% 70% at 50% 50%, rgba(58,12,163,0.3) 0%, transparent 70%),
        #0a0010;
    }

    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 38px 38px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 38px 38px; }
    }

    /* Floating orbs */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(70px); opacity: 0.35;
      animation: float 8s ease-in-out infinite;
      z-index: 0; pointer-events: none;
    }
    .orb1 { width:300px; height:300px; background:var(--pink);   top:-80px;  left:-80px;  animation-delay:0s; }
    .orb2 { width:250px; height:250px; background:var(--violet); bottom:-60px; right:-60px; animation-delay:-3s; }
    .orb3 { width:180px; height:180px; background:var(--blue);   top:50%;  left:60%;   animation-delay:-5s; }

    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-30px) scale(1.08); }
    }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px 16px;
    }

    /* ── LOGO ── */
    .brand {
      text-align: center; margin-bottom: 24px;
      animation: fadeDown 0.7s ease both;
    }
    .brand-icon {
      width: 58px; height: 58px;
      background: linear-gradient(135deg, var(--pink), var(--violet));
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 10px;
      box-shadow: 0 0 30px rgba(247,37,133,0.5);
    }
    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem; font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #fff 40%, var(--pink));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand p { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }

    /* ── MODE SWITCHER ── */
    .mode-switcher {
      display: flex; gap: 6px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(247,37,133,0.2);
      border-radius: 50px; padding: 5px;
      margin-bottom: 22px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      animation: fadeDown 0.7s ease 0.05s both;
    }
    .mode-btn {
      padding: 9px 22px; border-radius: 50px;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer; border: none;
      background: transparent; color: var(--muted);
      display: inline-flex; align-items: center; gap: 7px;
      transition: all 0.3s ease;
    }
    .mode-btn:hover { color: #fff; }
    .mode-btn.active {
      background: linear-gradient(135deg, var(--pink), var(--violet));
      color: #fff;
      box-shadow: 0 4px 16px rgba(247,37,133,0.4);
    }
    .mode-btn svg { width: 14px; height: 14px; }

    /* ── CARD ── */
    .card {
      width: 100%; max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(247,37,133,0.08),
        0 24px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: fadeUp 0.7s ease 0.15s both;
    }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:none; } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 6px;
      background: rgba(0,0,0,0.3);
      border-radius: 14px; padding: 5px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1; text-align: center;
      padding: 9px 0; border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; border: none;
      background: transparent; color: var(--muted);
      transition: all 0.25s ease;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--pink), var(--violet));
      color: #fff;
      box-shadow: 0 4px 16px rgba(247,37,133,0.35);
    }

    /* ── ADMIN BADGE ── */
    .admin-badge {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; margin-bottom: 22px;
      background: linear-gradient(135deg, rgba(247,37,133,0.12), rgba(114,9,183,0.12));
      border: 1px solid rgba(247,37,133,0.3);
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem; font-weight: 600;
      letter-spacing: 0.04em;
    }
    .admin-badge .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 12px var(--pink);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%     { opacity: 0.5; transform: scale(1.3); }
    }
    .admin-badge .label { color: #fff; }
    .admin-badge .sub   { color: var(--muted); font-weight: 400; font-size: 0.72rem; margin-left: auto; }

    /* ── FORM ── */
    .form-section { display: none; }
    .form-section.active { display: block; }
    .mode-pane { display: none; }
    .mode-pane.active { display: block; }

    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.75rem; font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px; letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff; font-size: 0.92rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus {
      border-color: var(--pink);
      background: rgba(247,37,133,0.06);
      box-shadow: 0 0 0 3px rgba(247,37,133,0.15);
    }

    /* ── BUTTON ── */
    .btn {
      width: 100%; margin-top: 6px;
      padding: 14px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--violet) 100%);
      border: none; border-radius: 12px;
      color: #fff; font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(247,37,133,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(rgba(255,255,255,0.12), transparent);
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(247,37,133,0.45); }
    .btn:active { transform: translateY(0); opacity: 0.85; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: rgba(255,255,255,0.1);
    }

    /* ── GOOGLE BUTTON ── */
    .btn-google {
      width: 100%; padding: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
    }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── ERROR / SUCCESS TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
      padding: 12px 22px; border-radius: 50px;
      font-size: 0.85rem; font-weight: 500;
      white-space: nowrap; z-index: 999;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
      opacity: 0; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.error   { background: #ff3366; color: #fff; box-shadow: 0 6px 24px rgba(255,51,102,0.4); }
    #toast.success { background: #22c55e; color: #fff; box-shadow: 0 6px 24px rgba(34,197,94,0.4); }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    .footer {
      margin-top: 20px; text-align: center;
      font-size: 0.73rem; color: var(--muted);
      animation: fadeUp 0.7s ease 0.3s both;
    }
    .footer a { color: var(--pink); text-decoration: none; }

    /* Mobile */
    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
      .mode-btn { padding: 8px 16px; font-size: 0.74rem; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">👾</div>
      <h1>Alone Monster Coding Hub</h1>
      <p>Members-only access</p>
    </div>

    <!-- Mode Switcher -->
    <div class="mode-switcher" role="tablist" aria-label="Login mode">
      <button class="mode-btn active" id="modeMemberBtn" onclick="switchMode('member')" role="tab" aria-selected="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
        Member Mode
      </button>
      <button class="mode-btn" id="modeAdminBtn" onclick="switchMode('admin')" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/></svg>
        Admin Mode
      </button>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- ═════ MEMBER PANE ═════ -->
      <div class="mode-pane active" id="memberPane">

        <!-- Tabs -->
        <div class="tabs">
          <button class="tab active" onclick="switchTab('login')">Login</button>
          <button class="tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- LOGIN FORM -->
        <div class="form-section active" id="loginSection">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password"/>
          </div>
          <button class="btn" id="loginBtn" onclick="handleLogin()">Login</button>

          <div class="divider">or</div>
          <button class="btn-google" onclick="handleGoogle()">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
          </button>
        </div>

        <!-- SIGNUP FORM -->
        <div class="form-section" id="signupSection">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="Your name" autocomplete="name"/>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Min. 6 characters" autocomplete="new-password"/>
          </div>
          <button class="btn" id="signupBtn" onclick="handleSignup()">Create Account</button>

          <div class="divider">or</div>
          <button class="btn-google" onclick="handleGoogle()">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign up with Google
          </button>
        </div>

      </div>

      <!-- ═════ ADMIN PANE ═════ -->
      <div class="mode-pane" id="adminPane">
        <div class="admin-badge">
          <span class="dot"></span>
          <span class="label">Admin Access</span>
          <span class="sub">Restricted area</span>
        </div>

        <div class="form-group">
          <label>Admin Username</label>
          <input type="text" id="adminUser" placeholder="Enter admin username" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label>Admin Password</label>
          <input type="password" id="adminPass" placeholder="Enter admin password" autocomplete="off"/>
        </div>
        <button class="btn" id="adminBtn" onclick="handleAdminLogin()">Enter Admin Panel</button>
      </div>

    </div>

    <div class="footer">
      Protected by Google &nbsp;·&nbsp;
      <a href="https://alone-monster.github.io">alone-monster.github.io</a>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- ══════════ FIREBASE CDN ══════════ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <script>
    // ══════════ FIREBASE CONFIG ══════════
    const firebaseConfig = {
      apiKey:            "AIzaSyBNeAqfrJ9fTjYUkWEpz-DZxOd9S1Rqp8c",
      authDomain:        "alone-monster-coding-hub.firebaseapp.com",
      projectId:         "alone-monster-coding-hub",
      storageBucket:     "alone-monster-coding-hub.firebasestorage.app",
      messagingSenderId: "92310923147",
      appId:             "1:92310923147:web:26a09f2aed09d9aef3718e",
      measurementId:     "G-4YPW7T4WGN"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Agar already logged in hai → seedha home bhejo
    auth.onAuthStateChanged((user) => {
      if (user) window.location.href = "/index.html";
    });

    // ══════════ MODE SWITCH (Member ↔ Admin) ══════════
    function switchMode(mode) {
      const isAdmin = mode === 'admin';
      document.getElementById('modeMemberBtn').classList.toggle('active', !isAdmin);
      document.getElementById('modeAdminBtn').classList.toggle('active', isAdmin);
      document.getElementById('modeMemberBtn').setAttribute('aria-selected', String(!isAdmin));
      document.getElementById('modeAdminBtn').setAttribute('aria-selected', String(isAdmin));
      document.getElementById('memberPane').classList.toggle('active', !isAdmin);
      document.getElementById('adminPane').classList.toggle('active', isAdmin);
    }

    // ══════════ TAB SWITCH ══════════
    function switchTab(tab) {
      document.querySelectorAll('#memberPane .tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('#memberPane .form-section').forEach(s => s.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + 'Section').classList.add('active');
    }

    // ══════════ TOAST ══════════
    function showToast(msg, type = 'error') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show ' + type;
      setTimeout(() => { t.className = ''; }, 3500);
    }

    // ══════════ LOADING STATE ══════════
    function setLoading(btnId, loading, originalText) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading
        ? `<span class="spinner"></span> Please wait...`
        : originalText;
    }

    // ══════════ LOGIN ══════════
    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPassword').value;

      if (!email || !pass) return showToast('⚠️ Email aur password dono daalo');

      setLoading('loginBtn', true, 'Login');
      try {
        await auth.signInWithEmailAndPassword(email, pass);
        showToast('✅ Login successful!', 'success');
        setTimeout(() => window.location.href = '/index.html', 800);
      } catch (err) {
        setLoading('loginBtn', false, 'Login');
        const msgs = {
          'auth/user-not-found':  '❌ Account nahi mila. Pehle signup karo.',
          'auth/wrong-password':  '❌ Password galat hai.',
          'auth/invalid-email':   '❌ Valid email daalo.',
          'auth/too-many-requests': '⚠️ Bahut zyada attempts. Thodi der baad try karo.',
        };
        showToast(msgs[err.code] || '❌ ' + err.message);
      }
    }

    // ══════════ SIGNUP ══════════
    async function handleSignup() {
      const name  = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const pass  = document.getElementById('signupPassword').value;

      if (!name)        return showToast('⚠️ Apna naam daalo');
      if (!email)       return showToast('⚠️ Email daalo');
      if (pass.length < 6) return showToast('⚠️ Password kam se kam 6 characters ka hona chahiye');

      setLoading('signupBtn', true, 'Create Account');
      try {
        const result = await auth.createUserWithEmailAndPassword(email, pass);
        await result.user.updateProfile({ displayName: name });
        showToast('🎉 Account ban gaya!', 'success');
        setTimeout(() => window.location.href = '/index.html', 800);
      } catch (err) {
        setLoading('signupBtn', false, 'Create Account');
        const msgs = {
          'auth/email-already-in-use': '❌ Yeh email pehle se registered hai. Login karo.',
          'auth/invalid-email':        '❌ Valid email daalo.',
          'auth/weak-password':        '❌ Password thoda strong rakho.',
        };
        showToast(msgs[err.code] || '❌ ' + err.message);
      }
    }

    // ══════════ GOOGLE LOGIN ══════════
    async function handleGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
        showToast('✅ Google login successful!', 'success');
        setTimeout(() => window.location.href = '/index.html', 800);
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          showToast('❌ Google login mein kuch gadbad hui.');
        }
      }
    }

    // ══════════ ADMIN LOGIN (hashed creds — raw values not in source) ══════════
    // SHA-256 hashes only. Raw username/password are NOT stored anywhere in this file.
    const _A = ['1b044deb66c9bbe934b146688797a604b423d3e7d2c786652bb7aa9fc65c760f',
                'c7931dd0300432a4a4ba013245f07acacad3c065996c92dbdb8df79a242c4282'];

    async function _sha256(str) {
      const buf = new TextEncoder().encode(str);
      const hash = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(hash))
        .map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleAdminLogin() {
      const u = document.getElementById('adminUser').value.trim();
      const p = document.getElementById('adminPass').value;

      if (!u || !p) return showToast('⚠️ Username aur password dono daalo');

      setLoading('adminBtn', true, 'Enter Admin Panel');
      try {
        const [hu, hp] = await Promise.all([_sha256(u), _sha256(p)]);
        if (hu === _A[0] && hp === _A[1]) {
          sessionStorage.setItem('amch_admin', '1');
          showToast('🛡️ Admin verified!', 'success');
          setTimeout(() => window.location.href = '/index.html', 700);
        } else {
          setLoading('adminBtn', false, 'Enter Admin Panel');
          showToast('❌ Galat admin credentials');
        }
      } catch (e) {
        setLoading('adminBtn', false, 'Enter Admin Panel');
        showToast('❌ Kuch gadbad hui, dobara try karo');
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const adminActive = document.getElementById('adminPane').classList.contains('active');
      if (adminActive) return handleAdminLogin();
      const loginActive = document.getElementById('loginSection').classList.contains('active');
      loginActive ? handleLogin() : handleSignup();
    });
  </script>
</body>
