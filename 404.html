<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>404 — Alone Monster Coding Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #050509;
      --green: #00ff88;
      --cyan: #00d4ff;
      --pink: #ff2d87;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --border: rgba(0,255,136,.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      touch-action: none;
    }

    /* MATRIX BG */
    #mc { position: fixed; inset: 0; z-index: 0; opacity: .045; pointer-events: none; }

    /* SCANLINES */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px);
    }

    /* LAYOUT */
    .page {
      position: fixed; inset: 0; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    .wrap {
      width: 100%; max-width: 430px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* GLITCH 404 */
    .glitch-wrap { position: relative; line-height: 1; margin-bottom: 2px; }
    .glitch {
      font-family: 'Orbitron', monospace; font-weight: 900;
      font-size: clamp(3.8rem, 15vw, 7.2rem);
      background: linear-gradient(135deg, var(--green) 0%, var(--cyan) 55%, var(--pink) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -2px; position: relative; display: inline-block;
      animation: gb 4s infinite;
    }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute; top: 0; left: 0;
      font-family: 'Orbitron', monospace; font-weight: 900;
      font-size: inherit; letter-spacing: -2px;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .glitch::before {
      background: var(--pink); -webkit-background-clip: text; background-clip: text;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      animation: gt 4s infinite;
    }
    .glitch::after {
      background: var(--cyan); -webkit-background-clip: text; background-clip: text;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
      animation: gbot 4s infinite;
    }
    @keyframes gb {
      0%,92%,100%{transform:none;filter:none}
      93%{transform:skewX(-4deg);filter:blur(.5px)}
      94%{transform:skewX(3deg) translateX(2px)}
      95%{transform:skewX(-1deg)}
      96%{transform:none}
      97%{transform:translateX(-3px);filter:blur(1px)}
      98%{transform:none;filter:none}
    }
    @keyframes gt {
      0%,91%,100%{transform:none;opacity:0}
      93%{transform:translateX(-4px);opacity:.75}
      94%{transform:translateX(4px);opacity:.55}
      95%{transform:translateX(-2px);opacity:.65}
      96%{transform:none;opacity:0}
      97%{transform:translateX(3px);opacity:.45}
      98%{opacity:0}
    }
    @keyframes gbot {
      0%,91%,100%{transform:none;opacity:0}
      93%{transform:translateX(4px);opacity:.65}
      94%{transform:translateX(-3px);opacity:.55}
      95%{transform:translateX(2px);opacity:.75}
      96%{transform:none;opacity:0}
      97%{transform:translateX(-4px);opacity:.5}
      98%{opacity:0}
    }

    .error-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(.56rem,1.8vw,.72rem);
      color: var(--green); letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 1px; animation: fi .8s ease;
    }
    .error-msg {
      font-size: clamp(.72rem,2.5vw,.88rem); color: var(--muted);
      margin-bottom: 7px; text-align: center; animation: fi 1s ease .2s both;
    }
    @keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    /* GAME BOX */
    .game-box {
      background: rgba(6,6,14,.97); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; width: 100%;
      box-shadow: 0 0 28px rgba(0,255,136,.05), inset 0 1px 0 rgba(255,255,255,.04);
      animation: fi .9s ease .3s both;
    }
    .tabs { display: flex; background: #08080f; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 10px 6px; text-align: center; cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(.66rem,2.4vw,.82rem);
      color: var(--muted); letter-spacing: 1px;
      border-bottom: 3px solid transparent; transition: all .2s; user-select: none;
    }
    .tab.active { color: var(--green); background: rgba(0,255,136,.07); border-bottom-color: var(--green); }

    .game-body { display: flex; justify-content: center; background: #000; padding: 8px; }
    #gc {
      display: block; border-radius: 8px;
      border: 1px solid rgba(0,255,136,.18); touch-action: none; cursor: crosshair;
    }

    .score-bar {
      display: flex; justify-content: center; gap: 18px; padding: 4px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(.6rem,1.8vw,.72rem); color: var(--muted);
      border-top: 1px solid var(--border); background: rgba(0,0,0,.3);
    }
    .score-bar b { color: var(--green); }

    /* D-PAD */
    .dpad { display: flex; gap: 10px; margin: 5px 0 2px; }
    .dp {
      width: 52px; height: 38px; background: rgba(0,255,136,.1);
      border: 1px solid rgba(0,255,136,.28); color: var(--green);
      border-radius: 8px; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none; transition: background .12s;
    }
    .dp:active { background: rgba(0,255,136,.28); }

    /* APAD 2048 */
    .apad { display: flex; flex-direction: column; align-items: center; gap: 3px; margin: 4px 0 2px; }
    .apad-row { display: flex; gap: 3px; }
    .ap {
      width: 38px; height: 34px; background: rgba(0,212,255,.1);
      border: 1px solid rgba(0,212,255,.28); color: var(--cyan);
      border-radius: 7px; font-size: .9rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; transition: background .12s;
    }
    .ap:active { background: rgba(0,212,255,.28); }

    /* BUTTONS */
    .btns { display: flex; gap: 10px; margin: 6px 0 4px; animation: fi .9s ease .5s both; }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: clamp(7px,2vw,10px) clamp(18px,5vw,30px);
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: clamp(.8rem,3vw,.98rem); letter-spacing: 1px;
      border: none; border-radius: 8px; cursor: pointer; transition: transform .12s, box-shadow .2s;
    }
    .btn:active { transform: scale(.96); }
    .btn-s { background: var(--green); color: #000; box-shadow: 0 0 16px rgba(0,255,136,.3); }
    .btn-a { background: var(--pink); color: #fff; box-shadow: 0 0 16px rgba(255,45,135,.3); }

    /* LINKS */
    .links {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
      margin-top: 5px; animation: fi 1s ease .6s both;
    }
    .site-btn {
      display: inline-flex; align-items: center; gap: 7px; padding: 6px 14px;
      background: rgba(0,255,136,.07); border: 1px solid rgba(0,255,136,.28);
      border-radius: 50px; color: var(--green); text-decoration: none;
      font-size: clamp(.68rem,2.4vw,.84rem); font-family: 'Rajdhani',sans-serif; font-weight: 600;
    }
    .site-btn img { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--green); }
    .soc {
      display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 50px; color: var(--text); text-decoration: none;
      font-size: clamp(.66rem,2.2vw,.8rem); font-family: 'Rajdhani',sans-serif; font-weight: 500;
      transition: background .2s, border-color .2s;
    }
    .soc:hover { background: rgba(255,255,255,.09); border-color: rgba(0,255,136,.35); }
  </style>
</head>
<body>

<canvas id="mc"></canvas>

<div class="page">
  <div class="wrap">

    <div class="error-tag">// ERROR 404 — PAGE NOT FOUND</div>
    <div class="glitch-wrap">
      <div class="glitch" data-text="404">404</div>
    </div>
    <p class="error-msg">Page doesn't exist or has been moved. Play a game while you're here.</p>

    <div class="game-box">
      <div class="tabs">
        <div class="tab active" data-game="breakout">⬜ BREAKOUT</div>
        <div class="tab" data-game="2048">🔢 2048</div>
      </div>
      <div class="game-body">
        <canvas id="gc"></canvas>
      </div>
      <div class="score-bar">SCORE:&nbsp;<b id="sv">0</b>&nbsp;&nbsp;|&nbsp;&nbsp;BEST:&nbsp;<b id="bv">0</b></div>
    </div>

    <div class="dpad" id="dpad">
      <button class="dp" id="dL">&#9664;</button>
      <button class="dp" id="dR">&#9654;</button>
    </div>
    <div class="apad" id="apad" style="display:none">
      <div class="apad-row"><button class="ap" data-dir="up">▲</button></div>
      <div class="apad-row">
        <button class="ap" data-dir="left">◀</button>
        <button class="ap" data-dir="down">▼</button>
        <button class="ap" data-dir="right">▶</button>
      </div>
    </div>

    <div class="btns">
      <button class="btn btn-s" id="startBtn">&#9654; START</button>
      <button class="btn btn-a" id="againBtn" style="display:none">&#8635; AGAIN</button>
    </div>

    <div class="links">
      <a href="https://alone-monster.github.io/" target="_blank" class="site-btn">
        <img src="https://alone-monster.github.io/favicon.png" alt="" onerror="this.style.display='none'">
        Main Website
      </a>
      <a href="https://github.com/alone-monster" target="_blank" class="soc"><i class="fab fa-github"></i> GitHub</a>
      <a href="https://instagram.com/anxiety4410" target="_blank" class="soc"><i class="fab fa-instagram"></i> Instagram</a>
      <a href="https://x.com/naskar_chi26012" target="_blank" class="soc"><i class="fab fa-x-twitter"></i> X</a>
      <a href="https://facebook.com/chirag.alonemonster" target="_blank" class="soc"><i class="fab fa-facebook"></i> Facebook</a>
    </div>

  </div>
</div>

<script>
/* ── MATRIX RAIN ── */
(function(){
  const c=document.getElementById('mc'), x=c.getContext('2d');
  let W,H,dr;
  function rsz(){ W=c.width=innerWidth; H=c.height=innerHeight; dr=Array(Math.floor(W/14)).fill(1); }
  rsz(); addEventListener('resize',rsz);
  setInterval(()=>{
    x.fillStyle='rgba(5,5,9,0.06)'; x.fillRect(0,0,W,H);
    x.fillStyle='#00ff88'; x.font='13px monospace';
    dr.forEach((y,i)=>{ x.fillText(Math.random()>.5?'1':'0',i*14,y*14); if(y*14>H&&Math.random()>.975)dr[i]=0; dr[i]++; });
  },50);
})();

/* ── CANVAS ── */
const gc=document.getElementById('gc'), gx=gc.getContext('2d');
let S=300;
function getS(){
  const avW=Math.min(innerWidth-20,414)-18;
  const avH=innerHeight-310;
  return Math.max(190,Math.min(avW,avH,360))|0;
}
function setSz(){
  S=getS(); gc.width=gc.height=S;
  gc.style.width=gc.style.height=S+'px';
}
setSz();
addEventListener('resize',()=>{ setSz(); currentGame==='2048'?draw2048():clearC(); });

/* ── STATE ── */
let currentGame='breakout', running=false, score=0, best={breakout:0,'2048':0}, raf=null;
const sv=document.getElementById('sv'), bv=document.getElementById('bv');
const startBtn=document.getElementById('startBtn'), againBtn=document.getElementById('againBtn');
const dpadEl=document.getElementById('dpad'), apadEl=document.getElementById('apad');

function setScore(v){ score=v; sv.textContent=v; if(v>best[currentGame]){best[currentGame]=v;bv.textContent=v;} }
function updBest(){ bv.textContent=best[currentGame]; sv.textContent=0; }
function clearC(){ gx.fillStyle='#000'; gx.fillRect(0,0,S,S); }

/* ── TABS ── */
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    if(t.classList.contains('active')) return;
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    if(raf){cancelAnimationFrame(raf);raf=null;}
    running=false; currentGame=t.dataset.game; score=0; updBest();
    startBtn.style.display=''; againBtn.style.display='none';
    dpadEl.style.display=currentGame==='breakout'?'flex':'none';
    apadEl.style.display=currentGame==='2048'?'flex':'none';
    if(currentGame==='2048'){reset2048();draw2048();}else clearC();
  });
});

/* ── START / AGAIN ── */
startBtn.addEventListener('click',startGame);
againBtn.addEventListener('click',startGame);
function startGame(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  score=0; sv.textContent=0; running=true;
  startBtn.style.display='none'; againBtn.style.display='none';
  if(currentGame==='breakout') initBreakout();
  else{reset2048();draw2048();}
}
function gameOver(msg,col){
  running=false; againBtn.style.display='';
  gx.fillStyle='rgba(0,0,0,.68)'; gx.fillRect(0,0,S,S);
  gx.fillStyle=col||'#00ff88';
  gx.font=`bold ${S*.077}px Orbitron,monospace`;
  gx.textAlign='center';
  gx.fillText(msg,S/2,S/2-S*.04);
  gx.fillStyle='#c8c8d8';
  gx.font=`${S*.053}px Rajdhani,monospace`;
  gx.fillText('SCORE: '+score,S/2,S/2+S*.065);
  gx.textAlign='left';
}

/* ════════════════════════════════════════
   BREAKOUT
════════════════════════════════════════ */
let pad,ball,bricks,bLeft,dpadDir=null;
const BC=['#ff2d87','#ff6b35','#ffcc00','#00ff88','#00d4ff'];

function initBreakout(){
  const pw=S*.27,ph=S*.037;
  pad={x:S/2-pw/2,y:S*.87,w:pw,h:ph};
  ball={x:S/2,y:S*.7,dx:S*.011,dy:-S*.011,r:S*.024};
  const cols=8,rows=5,bw=Math.floor((S-20)/cols)-4,bh=Math.floor(S*.046);
  const tw=cols*(bw+4)-4,sx=(S-tw)/2;
  bricks=[]; bLeft=0;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    bricks.push({x:sx+c*(bw+4),y:r*(bh+4)+S*.1,w:bw,h:bh,v:true,r});
    bLeft++;
  }
  setScore(0); loopBO();
}

function loopBO(){
  if(!running||currentGame!=='breakout') return;
  updateBO(); drawBO();
  raf=requestAnimationFrame(loopBO);
}

function updateBO(){
  const step=S*.047;
  if(dpadDir==='left')  pad.x=Math.max(0,pad.x-step);
  if(dpadDir==='right') pad.x=Math.min(S-pad.w,pad.x+step);
  ball.x+=ball.dx; ball.y+=ball.dy;
  if(ball.x-ball.r<0){ball.x=ball.r;ball.dx=Math.abs(ball.dx);}
  if(ball.x+ball.r>S){ball.x=S-ball.r;ball.dx=-Math.abs(ball.dx);}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.dy=Math.abs(ball.dy);}
  // paddle
  if(ball.dy>0&&ball.y+ball.r>=pad.y&&ball.y-ball.r<=pad.y+pad.h&&ball.x>=pad.x-ball.r&&ball.x<=pad.x+pad.w+ball.r){
    ball.dy=-Math.abs(ball.dy);
    const hp=(ball.x-(pad.x+pad.w/2))/(pad.w/2);
    ball.dx=hp*S*.013;
    if(Math.abs(ball.dx)<S*.006) ball.dx=ball.dx<0?-S*.006:S*.006;
    ball.y=pad.y-ball.r;
  }
  // bricks
  for(let i=0;i<bricks.length;i++){
    const b=bricks[i]; if(!b.v) continue;
    if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
      b.v=false; bLeft--; setScore(score+10);
      const oL=(ball.x+ball.r)-b.x,oR=(b.x+b.w)-(ball.x-ball.r);
      const oT=(ball.y+ball.r)-b.y,oB=(b.y+b.h)-(ball.y-ball.r);
      Math.min(oL,oR)<Math.min(oT,oB)?ball.dx*=-1:ball.dy*=-1;
      break;
    }
  }
  if(ball.y-ball.r>S){cancelAnimationFrame(raf);raf=null;gameOver('BALL LOST!','#ff2d87');}
  else if(bLeft===0){cancelAnimationFrame(raf);raf=null;gameOver('YOU WIN! 🎉','#00ff88');}
}

function drawBO(){
  gx.fillStyle='#000'; gx.fillRect(0,0,S,S);
  bricks.forEach(b=>{
    if(!b.v) return;
    gx.fillStyle=BC[b.r%BC.length];
    gx.beginPath(); gx.roundRect(b.x,b.y,b.w,b.h,3); gx.fill();
    gx.fillStyle='rgba(255,255,255,.16)';
    gx.beginPath(); gx.roundRect(b.x+2,b.y+2,b.w-4,b.h*.42,2); gx.fill();
  });
  const gr=gx.createLinearGradient(pad.x,0,pad.x+pad.w,0);
  gr.addColorStop(0,'#00ff88'); gr.addColorStop(1,'#00d4ff');
  gx.fillStyle=gr; gx.beginPath(); gx.roundRect(pad.x,pad.y,pad.w,pad.h,4); gx.fill();
  gx.shadowColor='#00d4ff'; gx.shadowBlur=14; gx.fillStyle='#fff';
  gx.beginPath(); gx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); gx.fill();
  gx.shadowBlur=0;
}

/* Paddle controls */
let dragging=false;
gc.addEventListener('mousedown',()=>dragging=true);
addEventListener('mouseup',()=>dragging=false);
gc.addEventListener('mousemove',e=>{
  if(!dragging||!running||currentGame!=='breakout') return;
  const r=gc.getBoundingClientRect();
  pad.x=(e.clientX-r.left)*(S/r.width)-pad.w/2;
  pad.x=Math.max(0,Math.min(S-pad.w,pad.x));
});
gc.addEventListener('touchstart',e=>{
  if(currentGame!=='breakout') return;
  e.preventDefault();
  const r=gc.getBoundingClientRect();
  pad.x=(e.touches[0].clientX-r.left)*(S/r.width)-pad.w/2;
  pad.x=Math.max(0,Math.min(S-pad.w,pad.x));
},{passive:false});
gc.addEventListener('touchmove',e=>{
  if(!running||currentGame!=='breakout') return;
  e.preventDefault();
  const r=gc.getBoundingClientRect();
  pad.x=(e.touches[0].clientX-r.left)*(S/r.width)-pad.w/2;
  pad.x=Math.max(0,Math.min(S-pad.w,pad.x));
},{passive:false});

document.getElementById('dL').addEventListener('mousedown',()=>dpadDir='left');
document.getElementById('dR').addEventListener('mousedown',()=>dpadDir='right');
document.getElementById('dL').addEventListener('touchstart',e=>{e.preventDefault();dpadDir='left';},{passive:false});
document.getElementById('dR').addEventListener('touchstart',e=>{e.preventDefault();dpadDir='right';},{passive:false});
addEventListener('mouseup',()=>dpadDir=null);
addEventListener('touchend',()=>dpadDir=null);

/* ════════════════════════════════════════
   2048
════════════════════════════════════════ */
let board=[],sc2=0;
const TC={0:'#111118',2:'#ff2d87',4:'#c4176a',8:'#00d4ff',16:'#0095b8',
          32:'#00ff88',64:'#00b362',128:'#ffcc00',256:'#ff8800',
          512:'#aa00ff',1024:'#7200cc',2048:'#ff2200'};

function reset2048(){ board=Array(4).fill(null).map(()=>Array(4).fill(0)); sc2=0; setScore(0); addT(); addT(); }

function addT(){
  let e=[];
  for(let i=0;i<4;i++) for(let j=0;j<4;j++) if(!board[i][j]) e.push([i,j]);
  if(!e.length) return;
  const [r,c]=e[Math.floor(Math.random()*e.length)];
  board[r][c]=Math.random()<.9?2:4;
}

function draw2048(){
  gx.fillStyle='#09090f'; gx.fillRect(0,0,S,S);
  const gap=Math.floor(S*.027),ts=Math.floor((S-gap*5)/4);
  const ox=Math.floor((S-(ts*4+gap*3))/2),oy=Math.floor((S-(ts*4+gap*3))/2);
  for(let i=0;i<4;i++) for(let j=0;j<4;j++){
    const v=board[i][j],x=ox+j*(ts+gap),y=oy+i*(ts+gap);
    gx.fillStyle=TC[v]||'#1c1c2a';
    gx.beginPath(); gx.roundRect(x,y,ts,ts,6); gx.fill();
    if(v){
      gx.fillStyle=v>=8?'#000':'#fff';
      const fs=v>=1000?ts*.26:v>=100?ts*.31:ts*.37;
      gx.font=`bold ${fs}px Orbitron,monospace`;
      gx.textAlign='center'; gx.textBaseline='middle';
      gx.fillText(v,x+ts/2,y+ts/2);
      gx.textBaseline='alphabetic'; gx.textAlign='left';
    }
  }
}

function slideL(){
  let moved=false;
  for(let i=0;i<4;i++){
    let row=board[i].filter(n=>n);
    for(let j=0;j<row.length-1;j++) if(row[j]===row[j+1]){row[j]*=2;sc2+=row[j];row.splice(j+1,1);moved=true;}
    while(row.length<4) row.push(0);
    if(JSON.stringify(board[i])!==JSON.stringify(row)) moved=true;
    board[i]=row;
  }
  return moved;
}
function rev(){ for(let i=0;i<4;i++) board[i].reverse(); }
function tr(){  for(let i=0;i<4;i++) for(let j=i;j<4;j++) [board[i][j],board[j][i]]=[board[j][i],board[i][j]]; }
function hasMove(){
  for(let i=0;i<4;i++) for(let j=0;j<4;j++){
    if(!board[i][j]) return true;
    if(j<3&&board[i][j]===board[i][j+1]) return true;
    if(i<3&&board[i][j]===board[i+1][j]) return true;
  }
  return false;
}

function move2048(dir){
  if(!running||currentGame!=='2048') return;
  let moved=false;
  if(dir==='left') moved=slideL();
  else if(dir==='right'){rev();moved=slideL();rev();}
  else if(dir==='up'){tr();moved=slideL();tr();}
  else if(dir==='down'){tr();rev();moved=slideL();rev();tr();}
  if(!moved) return;
  setScore(sc2); addT(); draw2048();
  for(let i=0;i<4;i++) for(let j=0;j<4;j++) if(board[i][j]===2048){gameOver('2048! 🎉','#ffcc00');return;}
  if(!hasMove()) gameOver('GAME OVER','#ff2d87');
}

/* 2048 swipe */
let t0x,t0y;
gc.addEventListener('touchstart',e=>{if(currentGame!=='2048')return;t0x=e.touches[0].clientX;t0y=e.touches[0].clientY;},{passive:true});
gc.addEventListener('touchend',e=>{
  if(currentGame!=='2048') return;
  const dx=e.changedTouches[0].clientX-t0x,dy=e.changedTouches[0].clientY-t0y;
  if(Math.abs(dx)<12&&Math.abs(dy)<12) return;
  move2048(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'));
});

/* Arrow pad */
document.querySelectorAll('.ap').forEach(b=>{
  b.addEventListener('click',()=>move2048(b.dataset.dir));
  b.addEventListener('touchstart',e=>{e.preventDefault();move2048(b.dataset.dir);},{passive:false});
});

/* Keyboard */
addEventListener('keydown',e=>{
  if(currentGame==='breakout'&&running){
    const step=S*.047;
    if(e.key==='ArrowLeft'){pad.x=Math.max(0,pad.x-step);e.preventDefault();}
    if(e.key==='ArrowRight'){pad.x=Math.min(S-pad.w,pad.x+step);e.preventDefault();}
  }
  if(currentGame==='2048'){
    const d=e.key.replace('Arrow','').toLowerCase();
    if(['left','right','up','down'].includes(d)){move2048(d);e.preventDefault();}
  }
});

/* Init */
clearC(); reset2048(); draw2048(); running=false;
</script>
