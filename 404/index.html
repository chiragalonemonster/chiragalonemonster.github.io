<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="robots" content="noindex,nofollow"/>
    <meta name="robots" content="noindex,nofollow"/>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com"/>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png"/>
  <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png"/>

  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <title>404 — Alone Monster Coding Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root{
      --bg:#050509; 
      --green:#00ff88; 
      --cyan:#00d4ff; 
      --pink:#ff2d87; 
      --text:#e8e8f0; 
      --muted:#6b6b8a; 
      --border:rgba(0,255,136,.2);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;}
    body{display:flex;align-items:center;justify-content:center;position:relative;}

    /* Background Effects */
    #mc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.04;pointer-events:none;}
    
    .container{position:relative;z-index:1;text-align:center;padding:15px 15px;max-width:420px;width:100%;}

    .error-tag{
      font-family:'JetBrains Mono',monospace;
      font-size:0.76rem;
      color:var(--green);
      letter-spacing:3px;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    
    .error-num{
      font-family:'Orbitron',monospace;
      font-size:clamp(5.4rem,17vw,9.5rem);
      font-weight:900;
      background:linear-gradient(135deg,var(--green),var(--cyan));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      letter-spacing:-3px;
      margin-bottom:12px;
    }

    .error-msg{
      font-size:0.95rem;
      color:var(--muted);
      line-height:1.5;
      margin-bottom:18px;
    }

    .game-container{
      background:rgba(8,8,15,.95);
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      margin:15px auto;
      max-width:380px;
    }

    .game-tabs{
      display:flex;
      background:#0f0f1a;
    }
    .tab{
      flex:1;
      padding:13px;
      font-family:'JetBrains Mono',monospace;
      font-size:0.88rem;
      cursor:pointer;
      color:var(--muted);
    }
    .tab.active{
      background:rgba(0,255,136,.15);
      color:var(--green);
      border-bottom:3px solid var(--green);
    }

    .game-body{
      padding:12px;
      background:#000;
      display:flex;
      justify-content:center;
    }
    #gameCanvas{
      width: 360px;
      height: 360px;        /* Perfect Square */
      border:2px solid rgba(0,255,136,0.35);
      border-radius:10px;
      display:block;
    }

    .controls{
      margin:16px 0 20px;
    }
    .btn{
      padding:12px 36px;
      font-size:1.05rem;
      font-weight:700;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin:0 6px;
    }
    .start-btn{background:var(--green);color:#000;}
    .try-again{background:var(--pink);color:white;display:none;}
    .try-again.show{display:inline-block;}

    .social-links{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:14px;
      margin:20px 0 15px;
    }
    .social-btn{
      display:flex;
      align-items:center;
      gap:8px;
      padding:9px 18px;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--border);
      border-radius:50px;
      color:var(--text);
      text-decoration:none;
      font-size:0.92rem;
    }

    .site-btn{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 22px;
      background:rgba(0,255,136,0.08);
      border:1px solid rgba(0,255,136,0.3);
      border-radius:30px;
      color:var(--green);
      text-decoration:none;
      font-size:0.95rem;
    }
    .site-btn img{
      width:28px;
      height:28px;
      border-radius:50%;
      border:2px solid var(--green);
    }
  </style>
</head>
<body>

  <canvas id="mc"></canvas>

  <div class="container">
    <div class="error-tag">// ERROR 404 — PAGE NOT FOUND</div>
    <div class="error-num">404</div>

    <p class="error-msg">
      The page you are looking for doesn't exist or has been moved. Play a game while you're here.
    </p>

    <div class="game-container">
      <div class="game-tabs">
        <div class="tab active" data-game="breakout">BREAKOUT</div>
        <div class="tab" data-game="2048">2048</div>
      </div>
      <div class="game-body">
        <canvas id="gameCanvas" width="360" height="360"></canvas>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn" class="btn start-btn"><i class="fas fa-play"></i> START GAME</button>
      <button id="tryAgainBtn" class="btn try-again"><i class="fas fa-redo"></i> PLAY AGAIN</button>
    </div>

    <a href="https://alone-monster.github.io/" target="_blank" class="site-btn">
      <img src="https://alone-monster.github.io/favicon.png" alt="AloneMonster">
      Visit Main Website
    </a>

    <div class="social-links">
      <a href="https://github.com/alone-monster" target="_blank" class="social-btn"><i class="fab fa-github"></i> GitHub</a>
      <a href="https://instagram.com/anxiety4410" target="_blank" class="social-btn"><i class="fab fa-instagram"></i> Instagram</a>
      <a href="https://facebook.com/chirag.alonemonster" target="_blank" class="social-btn"><i class="fab fa-facebook"></i> Facebook</a>
      <a href="https://x.com/naskar_chi26012" target="_blank" class="social-btn"><i class="fab fa-x-twitter"></i> X</a>
    </div>
  </div>

  <script>
    // Matrix Rain Background
    (function(){
      const c = document.getElementById('mc');
      const ctx = c.getContext('2d');
      let W, H, drops;
      function resize(){
        W = c.width = window.innerWidth;
        H = c.height = window.innerHeight;
        drops = new Array(Math.floor(W/14)).fill(1);
      }
      resize();
      window.addEventListener('resize', resize);
      setInterval(() => {
        ctx.fillStyle = 'rgba(5,5,9,0.06)';
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle = '#00ff88';
        ctx.font = '13px JetBrains Mono';
        drops.forEach((y,i) => {
          ctx.fillText(Math.random() > .5 ? '1' : '0', i*14, y*14);
          if(y*14 > H && Math.random() > .975) drops[i] = 0;
          drops[i]++;
        });
      }, 50);
    })();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let currentGame = 'breakout';
    let gameRunning = false;

    // Tab Switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentGame = tab.dataset.game;
        resetToStart();
      });
    });

    document.getElementById('startBtn').addEventListener('click', () => {
      gameRunning = true;
      document.getElementById('startBtn').style.display = 'none';
      if(currentGame === 'breakout') initBreakout();
      else init2048();
    });

    document.getElementById('tryAgainBtn').addEventListener('click', () => {
      resetToStart();
      gameRunning = true;
      document.getElementById('tryAgainBtn').classList.remove('show');
      if(currentGame === 'breakout') initBreakout();
      else init2048();
    });

    function resetToStart() {
      gameRunning = false;
      document.getElementById('startBtn').style.display = 'inline-block';
      document.getElementById('tryAgainBtn').classList.remove('show');
      ctx.fillStyle = '#000';
      ctx.fillRect(0,0,360,360);
    }

    // ==================== BREAKOUT (Slower) ====================
    let paddle, ball, bricks;

    function initBreakout() {
      paddle = {x: 135, y: 310, w: 90, h: 14};
      ball = {x: 180, y: 240, dx: 2.6, dy: -2.6, r: 8};   // Slower speed
      bricks = [];
      for(let r = 0; r < 5; r++) {
        for(let c = 0; c < 8; c++) {
          bricks.push({
            x: c*42 + 24,
            y: r*23 + 48,
            w: 38,
            h: 18,
            v: true
          });
        }
      }
      gameLoop();
    }

    // Paddle Control
    let dragging = false;
    canvas.addEventListener('mousedown', () => dragging = true);
    window.addEventListener('mouseup', () => dragging = false);
    canvas.addEventListener('mousemove', e => {
      if(!gameRunning || currentGame !== 'breakout' || !dragging) return;
      const rect = canvas.getBoundingClientRect();
      paddle.x = e.clientX - rect.left - paddle.w/2;
      paddle.x = Math.max(10, Math.min(360 - paddle.w - 10, paddle.x));
    });

    canvas.addEventListener('touchstart', e => { dragging = true; e.preventDefault(); });
    canvas.addEventListener('touchend', () => dragging = false);
    canvas.addEventListener('touchmove', e => {
      if(!gameRunning || currentGame !== 'breakout' || !dragging) return;
      const rect = canvas.getBoundingClientRect();
      paddle.x = e.touches[0].clientX - rect.left - paddle.w/2;
      paddle.x = Math.max(10, Math.min(360 - paddle.w - 10, paddle.x));
      e.preventDefault();
    });

    function updateBreakout() {
      if(!gameRunning) return;
      ball.x += ball.dx;
      ball.y += ball.dy;

      if(ball.x - ball.r < 0 || ball.x + ball.r > 360) ball.dx *= -1;
      if(ball.y - ball.r < 0) ball.dy *= -1;

      if(ball.y + ball.r > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
        ball.dy *= -1.02;
      }

      for(let i = 0; i < bricks.length; i++) {
        let b = bricks[i];
        if(b.v && ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
          b.v = false;
          ball.dy *= -1;
        }
      }

      if(ball.y > 360) {
        gameRunning = false;
        document.getElementById('tryAgainBtn').classList.add('show');
      }
      if(bricks.every(b => !b.v)) {
        gameRunning = false;
        document.getElementById('tryAgainBtn').classList.add('show');
      }
    }

    function drawBreakout() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0,0,360,360);

      ctx.fillStyle = '#00ff88';
      ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

      ctx.fillStyle = '#00d4ff';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = '#ff2d87';
      bricks.forEach(b => {
        if(b.v) ctx.fillRect(b.x, b.y, b.w, b.h);
      });
    }

    // ==================== 2048 ====================
    let board = Array(4).fill().map(() => Array(4).fill(0));

    function init2048() {
      board = Array(4).fill().map(() => Array(4).fill(0));
      addTile();
      addTile();
      draw2048();
    }

    function addTile() {
      let empty = [];
      for(let i=0; i<4; i++) for(let j=0; j<4; j++) if(!board[i][j]) empty.push([i,j]);
      if(empty.length === 0) return;
      let [r,c] = empty[Math.floor(Math.random()*empty.length)];
      board[r][c] = Math.random() < 0.9 ? 2 : 4;
      draw2048();
    }

    function draw2048() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0,0,360,360);
      const size = 78;
      const gap = 12;
      const offset = 24;

      for(let i=0; i<4; i++) {
        for(let j=0; j<4; j++) {
          let val = board[i][j];
          let x = offset + j * (size + gap);
          let y = offset + i * (size + gap);

          ctx.fillStyle = val ? '#00ff88' : '#1f1f2e';
          ctx.fillRect(x, y, size, size);

          if(val) {
            ctx.fillStyle = '#000';
            ctx.font = 'bold 28px Rajdhani';
            ctx.textAlign = 'center';
            ctx.fillText(val, x + size/2, y + size/2 + 10);
          }
        }
      }
    }

    // Touch swipe for 2048
    let startX, startY;
    canvas.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    });

    canvas.addEventListener('touchend', e => {
      if(!gameRunning || currentGame !== '2048') return;
      let dx = e.changedTouches[0].clientX - startX;
      let dy = e.changedTouches[0].clientY - startY;

      if(Math.abs(dx) > Math.abs(dy)) {
        move2048(dx > 0 ? 'right' : 'left');
      } else {
        move2048(dy > 0 ? 'down' : 'up');
      }
    });

    function move2048(dir) {
      // Simplified movement (you can enhance later)
      let moved = false;
      if(dir === 'left') moved = slideLeft();
      else if(dir === 'right') { reverseRows(); moved = slideLeft(); reverseRows(); }
      else if(dir === 'up') { transpose(); moved = slideLeft(); transpose(); }
      else if(dir === 'down') { transpose(); reverseRows(); moved = slideLeft(); reverseRows(); transpose(); }

      if(moved) addTile();
    }

    function slideLeft() {
      let moved = false;
      for(let i=0; i<4; i++) {
        let row = board[i].filter(n => n);
        for(let j=0; j<row.length-1; j++) {
          if(row[j] === row[j+1]) {
            row[j] *= 2;
            row.splice(j+1, 1);
            moved = true;
          }
        }
        while(row.length < 4) row.push(0);
        if(JSON.stringify(board[i]) !== JSON.stringify(row)) moved = true;
        board[i] = row;
      }
      return moved;
    }

    function reverseRows() { for(let i=0;i<4;i++) board[i].reverse(); }
    function transpose() {
      for(let i=0;i<4;i++) for(let j=i;j<4;j++) {
        [board[i][j], board[j][i]] = [board[j][i], board[i][j]];
      }
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if(gameRunning && currentGame === '2048') {
        const dir = e.key.replace('Arrow','').toLowerCase();
        if(['left','right','up','down'].includes(dir)) move2048(dir);
      }
    });

    // Main Game Loop
    function gameLoop() {
      if(gameRunning) {
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,360,360);

        if(currentGame === 'breakout') {
          updateBreakout();
          drawBreakout();
        } else {
          draw2048();
        }
      }
      requestAnimationFrame(gameLoop);
    }

    // Initial blank canvas
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,360,360);
    gameLoop();
  </script>
</body>
</html>
